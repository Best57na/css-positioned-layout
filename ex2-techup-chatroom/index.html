<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css" />
  <script src="https://kit.fontawesome.com/bf7220ad33.js" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun&display=swap" rel="stylesheet">
  <title>Positioned Layout Exercise 2 TechUp Chatroom</title>
</head>

<body>
  <!-- Start coding here -->
  <header class="header">
    <h1>Techup Chatroom</h1>
  </header>

  <main class="chatroom">
    <div class="bubble-green-tail-wrap">
      <div class="bubble bubble-green bubble-green-tail">
        สวัสดีจ้า
      </div>
    </div>

    <div class="bubble-grey-wrap">
      <div class="bubble bubble-grey">
        Coding สนุกจังเลย
        <button class="close-btn" type="button" aria-label="Close">x</button>
      </div>
    </div>

    <div class="bubble bubble-right bubble-green bubble-emoji-right">
      😍 🤩
    </div>

    <div class="bubble bubble-left bubble-emoji-1">😍</div>
    <div class="bubble bubble-left bubble-emoji-2">😘</div>
  </main>
</body>

</html>
